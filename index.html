<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Vision Pro Spatial Computing</title>

<link rel="stylesheet" href="style.css">

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<!-- Three.js -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>

</head>

<body>

<div id="app">

    <!-- Webcam -->

    <video
        id="video"
        autoplay
        playsinline>
    </video>

    <!-- MediaPipe Canvas -->

    <canvas id="canvas"></canvas>

    <!-- Three.js -->

    <canvas id="threeCanvas"></canvas>

    <!-- Spatial Pointer -->

    <div id="pointer">

        <div class="pointerGlow"></div>

        <div class="pointerDot"></div>

    </div>

    <!-- Floating HUD -->

    <div id="hud">

        <div class="glass">

            Spatial Computing

        </div>

    </div>

    <!-- Inspector -->

    <div id="inspector">

        <div class="glass">

            <h2>Object Inspector</h2>

            <p>ID :
                <span id="objID">-</span>
            </p>

            <p>X :
                <span id="px">0</span>
            </p>

            <p>Y :
                <span id="py">0</span>
            </p>

            <p>Z :
                <span id="pz">0</span>
            </p>

            <p>Rot X :
                <span id="rx">0</span>
            </p>

            <p>Rot Y :
                <span id="ry">0</span>
            </p>

            <p>Rot Z :
                <span id="rz">0</span>
            </p>

            <p>Scale :
                <span id="scale">1</span>
            </p>

            <p>Status :
                <span id="status">None</span>
            </p>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
